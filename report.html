<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaRadar Deep Report</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #171b24;
      --text-main: #f2f5ff;
      --text-sub: #9ca7c2;
      --accent: #3b82f6;
      --border: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 20%, #1a2440 0%, transparent 38%),
        radial-gradient(circle at 85% 0%, #1a2d57 0%, transparent 30%),
        var(--bg);
      color: var(--text-main);
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 24px 16px 48px;
    }
    .wrap { width: min(980px, 100%); margin: 0 auto; }
    .nav a {
      color: var(--text-sub);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      margin-right: 14px;
    }
    .nav a:hover { color: #93c5fd; }
    h1 { margin: 14px 0 8px; font-size: clamp(1.8rem, 4vw, 2.4rem); }
    .subtitle { margin: 0 0 18px; color: var(--text-sub); }
    .msg { color: #fbbf24; min-height: 22px; }
    .panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .panel h2 { margin: 0 0 8px; font-size: 1.08rem; }
    .content { color: #dde4f9; white-space: pre-wrap; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="nav">
      <a href="index.html">Search</a>
      <a href="pricing.html">Pricing</a>
      <a href="feedback.html">Feedback</a>
    </nav>
    <h1>Deep Report</h1>
    <p class="subtitle">Generated by DeepSeek for your selected pain point.</p>
    <p class="msg" id="message"></p>
    <section id="reportRoot"></section>
  </div>

  <script>
    const messageEl = document.getElementById("message");
    const root = document.getElementById("reportRoot");
    const token = localStorage.getItem("ideaRadarAccessToken") || "";

    function setMessage(text) { messageEl.textContent = text || ""; }
    function esc(v) {
      return String(v ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function readParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || "";
    }
    function formatSection(title, value) {
      return `
        <article class="panel">
          <h2>${esc(title)}</h2>
          <div class="content">${esc(typeof value === "string" ? value : JSON.stringify(value, null, 2))}</div>
        </article>
      `;
    }

    async function loadReport() {
      if (!token) {
        setMessage("Please sign in first.");
        window.location.href = "auth.html";
        return;
      }
      const reportId = readParam("report_id");
      if (!reportId) {
        setMessage("Missing report_id.");
        return;
      }

      const res = await fetch(`/api/report?report_id=${encodeURIComponent(reportId)}`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || "Failed to load report.");

      const report = json.report?.report_json || {};
      root.innerHTML = [
        formatSection("1. Executive Summary", report.executive_summary),
        formatSection("2. Market Potential (TAM/SAM/SOM, growth trends)", report.market_potential),
        formatSection("3. Competitive Landscape", report.competitive_landscape),
        formatSection("4. Target User Persona (2 personas)", report.target_user_persona),
        formatSection("5. Monetization Strategy", report.monetization_strategy),
        formatSection("6. Action Plan (7-day, 30-day, 90-day)", report.action_plan),
        formatSection("7. Recommended Tech Stack", report.recommended_tech_stack),
        formatSection("8. Risk & Mitigation", report.risk_mitigation),
      ].join("");
    }

    loadReport().catch((error) => setMessage(error.message || "Failed to render report."));
  </script>
</body>
</html>
