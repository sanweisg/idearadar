<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IdeaRadar - Sign In / Sign Up</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0D0D;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #1A1A1A;
      padding: 40px;
      border-radius: 14px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h2 { font-size: 1.4rem; margin-bottom: 16px; color: #fff; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
    input {
      display: block; width: 100%; padding: 12px; margin-bottom: 12px;
      border: 1px solid #333; border-radius: 8px; background: #0D0D0D;
      color: #fff; font-size: 1rem;
    }
    button {
      width: 100%; padding: 12px; background: #3B82F6; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
      margin-bottom: 12px;
    }
    button:hover { background: #2563EB; }
    .switch-link { color: #3B82F6; cursor: pointer; text-decoration: underline; }
    .back-link { display: block; margin-bottom: 20px; color: #888; text-decoration: none; text-align: left; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← Back to IdeaRadar</a>
    <h2 id="form-title">Sign In to IdeaRadar</h2>

    <!-- 登录表单 -->
    <form id="sign-in-form">
      <input type="email" id="sign-in-email" placeholder="Email" required>
      <input type="password" id="sign-in-password" placeholder="Password" required>
      <button type="submit">Sign In</button>
      <p>Don't have an account? <span class="switch-link" id="link-to-signup">Switch to Sign Up</span></p>
    </form>

    <!-- 注册表单（默认隐藏） -->
    <form id="sign-up-form" class="hidden">
      <input type="email" id="sign-up-email" placeholder="Email" required>
      <input type="password" id="sign-up-password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
      <p>Already have an account? <span class="switch-link" id="link-to-signin">Switch to Sign In</span></p>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    
    const SUPABASE_URL = 'https://upmmwyyprnpyishumfie.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_kNgXkVfZMzZz_UwlwM81Pg_KVfrgZE6';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const signInForm = document.getElementById('sign-in-form');
    const signUpForm = document.getElementById('sign-up-form');
    const formTitle = document.getElementById('form-title');

    // 切换函数
    document.getElementById('link-to-signup').onclick = function(e) {
      e.preventDefault();
      signInForm.classList.add('hidden');
      signUpForm.classList.remove('hidden');
      formTitle.textContent = 'Create Your IdeaRadar Account';
    };

    document.getElementById('link-to-signin').onclick = function(e) {
      e.preventDefault();
      signUpForm.classList.add('hidden');
      signInForm.classList.remove('hidden');
      formTitle.textContent = 'Sign In to IdeaRadar';
    };

    // 登录
    signInForm.onsubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById('sign-in-email').value;
      const password = document.getElementById('sign-in-password').value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        alert('Sign in failed: ' + error.message);
        return;
      }
      window.location.href = 'index.html';
    };

    // 注册
    signUpForm.onsubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById('sign-up-email').value;
      const password = document.getElementById('sign-up-password').value;
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) {
        alert('Sign up failed: ' + error.message);
        return;
      }
      alert('Account created! You can now sign in.');
      signUpForm.classList.add('hidden');
      signInForm.classList.remove('hidden');
      formTitle.textContent = 'Sign In to IdeaRadar';
    };
  </script>
</body>
</html>
