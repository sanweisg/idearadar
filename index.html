<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaRadar</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f1117;
      --bg-soft: #151922;
      --card: #f5f7ff;
      --text-main: #f2f5ff;
      --text-sub: #9ca7c2;
      --accent: #3b82f6;
      --accent-dark: #5b9bff;
      --card-text: #1c2436;
      --card-sub: #5a6685;
      --shadow: 0 18px 40px rgba(10, 12, 20, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, #1a2440 0%, transparent 38%),
        radial-gradient(circle at 85% 0%, #1a2d57 0%, transparent 30%),
        var(--bg);
      padding: 24px 16px 42px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(rgba(130, 160, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(130, 160, 255, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 70%);
    }
    .container { width: min(980px, 100%); margin: 0 auto; text-align: center; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 22px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
    }
    .brand {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      background: linear-gradient(90deg, #dbeafe 0%, #93c5fd 55%, #60a5fa 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .account {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.86rem;
      color: var(--text-sub);
    }
    .hidden { display: none !important; }
    .nav-loading {
      color: var(--text-sub);
      font-size: 0.82rem;
      font-weight: 600;
    }
    .logout-btn, .small-link {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .logout-btn:hover, .small-link:hover { background: rgba(91, 155, 255, 0.2); border-color: rgba(91, 155, 255, 0.6); }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.5vw, 3.1rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 800;
    }
    .subtitle {
      margin: 14px auto 0;
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      color: var(--text-sub);
      max-width: 680px;
    }
    .status-msg {
      margin: 14px auto 0;
      max-width: 700px;
      color: #fbbf24;
      font-size: 0.9rem;
      min-height: 22px;
    }
    .search-row {
      margin: 10px auto 0;
      width: min(700px, 100%);
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      position: relative;
    }
    .search-row::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 14px;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(59, 130, 246, 0.35), rgba(56, 189, 248, 0.25), rgba(99, 102, 241, 0.3));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      padding: 1px;
      opacity: 0.5;
    }
    .search-input {
      flex: 1;
      border: 1px solid transparent;
      outline: none;
      border-radius: 10px;
      background: var(--bg-soft);
      color: var(--text-main);
      padding: 14px 16px;
      font-size: 1rem;
    }
    .search-btn {
      border: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 0.97rem;
      font-weight: 700;
      color: white;
      background: var(--accent);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.35);
    }
    .search-btn:hover { background: var(--accent-dark); }
    .search-input:focus {
      border-color: rgba(59, 130, 246, 0.75);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.22);
    }
    .recent-searches { margin: 14px auto 0; width: min(700px, 100%); text-align: left; }
    .recent-title { margin: 0 0 10px; color: var(--text-sub); font-size: 0.9rem; font-weight: 600; }
    .recent-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .recent-tag {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.84rem;
      cursor: pointer;
    }
    .results {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      text-align: left;
    }
    .result-card {
      background: var(--card);
      color: var(--card-text);
      border-radius: 14px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      position: relative;
    }
    .result-card:hover { transform: translateY(-6px); box-shadow: var(--shadow); }
    .result-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      pointer-events: none;
      background: linear-gradient(140deg, rgba(59, 130, 246, 0.22), rgba(99, 102, 241, 0) 45%);
      opacity: 0.75;
    }
    .card-title { margin: 0 0 8px; font-size: 1.02rem; font-weight: 700; line-height: 1.35; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-bottom: 10px; font-size: 0.86rem; color: var(--card-sub); }
    .source { color: #3b67d1; font-weight: 600; }
    .heat { font-weight: 600; }
    .desc { margin: 0; color: #3e4a67; font-size: 0.92rem; line-height: 1.55; }
    .report-btn {
      width: 100%;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .report-btn:hover { background: #5b9bff; }
    .paypal-area { margin-top: 10px; }
    .page-footer { margin-top: 36px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .footer-link {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-sub);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 7px 12px;
      border-radius: 999px;
    }
    .footer-link:hover { color: var(--accent-dark); border-color: rgba(91, 155, 255, 0.6); }
  </style>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div class="brand">IdeaRadar</div>
      <div class="account">
        <span id="navLoading" class="nav-loading">Loading session...</span>
        <span id="userEmail" class="hidden"></span>
        <span id="creditsInfo" class="hidden"></span>
        <a class="small-link" href="pricing.html">Pricing</a>
        <a id="signInLink" class="small-link hidden" href="auth.html">Sign In</a>
        <button id="logoutBtn" class="logout-btn hidden" type="button">Logout</button>
      </div>
    </header>

    <h1>Find Startup Ideas in One Search</h1>
    <p class="subtitle">Discover real pain points from Reddit, powered by AI</p>
    <p id="statusMessage" class="status-msg"></p>

    <div class="search-row">
      <input id="searchInput" class="search-input" type="text" placeholder="Try: remote team productivity, pet health, travel planning..." />
      <button id="searchBtn" class="search-btn" type="button">Search</button>
    </div>

    <section class="recent-searches">
      <p class="recent-title">Recent searches</p>
      <div id="recentTags" class="recent-tags"></div>
    </section>
    <section id="results" class="results"></section>

    <nav class="page-footer" aria-label="More">
      <a class="footer-link" href="feedback.html">Feedback</a>
      <a class="footer-link" href="pricing.html">Pricing</a>
      <a class="footer-link" href="report.html">Open report by ID</a>
    </nav>
  </main>

  <script>
    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");
    const recentTags = document.getElementById("recentTags");
    const statusMessage = document.getElementById("statusMessage");
    const userEmailEl = document.getElementById("userEmail");
    const creditsInfoEl = document.getElementById("creditsInfo");
    const logoutBtn = document.getElementById("logoutBtn");
    const signInLink = document.getElementById("signInLink");
    const navLoading = document.getElementById("navLoading");

    const defaultBtnText = searchBtn.textContent;
    const RECENT_SEARCHES_KEY = "ideaRadarRecentSearches";
    const MAX_RECENT_SEARCHES = 20;
    let accessToken = "";
    let paypalClientId = "";
    let profileState = null;
    let isAuthenticated = false;
    let supabaseClient = null;
    let authSubscription = null;

    function setStatus(text) { statusMessage.textContent = text || ""; }
    function escapeHtml(value) {
      return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function starsFromPainIntensity(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      if (n >= 1 && n <= 3) return "⭐";
      if (n >= 4 && n <= 6) return "⭐⭐";
      if (n >= 7 && n <= 8) return "⭐⭐⭐";
      if (n >= 9 && n <= 10) return "⭐⭐⭐⭐";
      return "";
    }
    function isProActive(profile) {
      if (!profile || !profile.is_pro || !profile.pro_expiry_date) return false;
      return new Date(profile.pro_expiry_date).getTime() > Date.now();
    }
    function updateAccountUi() {
      navLoading.classList.add("hidden");

      if (!isAuthenticated || !profileState) {
        userEmailEl.classList.add("hidden");
        creditsInfoEl.classList.add("hidden");
        logoutBtn.classList.add("hidden");
        signInLink.classList.remove("hidden");
        return;
      }

      const credits = Number(profileState.search_credits || 0);
      const proFlag = isProActive(profileState) ? "Pro active" : "Non-Pro";
      userEmailEl.textContent = profileState.email || "User";
      const adminFlag = profileState.is_admin ? "Admin" : "User";
      creditsInfoEl.textContent = `${adminFlag} | ${proFlag} | Credits left: ${credits}`;
      userEmailEl.classList.remove("hidden");
      creditsInfoEl.classList.remove("hidden");
      logoutBtn.classList.remove("hidden");
      signInLink.classList.add("hidden");

      let adminLink = document.getElementById("adminLink");
      if (profileState.is_admin) {
        if (!adminLink) {
          adminLink = document.createElement("a");
          adminLink.id = "adminLink";
          adminLink.className = "small-link";
          adminLink.href = "admin.html";
          adminLink.textContent = "Admin";
          logoutBtn.insertAdjacentElement("beforebegin", adminLink);
        }
      } else if (adminLink) {
        adminLink.remove();
      }
    }

    function getRecentSearches() {
      try {
        const raw = localStorage.getItem(RECENT_SEARCHES_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch { return []; }
    }
    function saveRecentSearches(keywords) {
      localStorage.setItem(RECENT_SEARCHES_KEY, JSON.stringify(keywords.slice(0, MAX_RECENT_SEARCHES)));
    }
    function renderRecentSearches() {
      const keywords = getRecentSearches();
      recentTags.innerHTML = keywords.map((keyword) => {
        const safe = escapeHtml(keyword);
        return `<button class="recent-tag" type="button" data-keyword="${safe}">${safe}</button>`;
      }).join("");
    }
    function pushRecentSearch(keyword) {
      const value = keyword.trim();
      if (!value) return;
      const list = getRecentSearches().filter((item) => item.toLowerCase() !== value.toLowerCase());
      list.unshift(value);
      saveRecentSearches(list);
      renderRecentSearches();
    }

    async function ensurePayPalLoaded() {
      if (window.paypal) return;
      if (!paypalClientId) {
        const configRes = await fetch("/api/config");
        const config = await configRes.json();
        paypalClientId = config.paypalClientId || "";
      }
      if (!paypalClientId) throw new Error("PAYPAL_CLIENT_ID is not configured.");
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = `https://www.paypal.com/sdk/js?client-id=${encodeURIComponent(paypalClientId)}&currency=USD`;
        s.onload = resolve;
        s.onerror = () => reject(new Error("Failed to load PayPal SDK."));
        document.head.appendChild(s);
      });
    }

    async function captureReportOrder(orderID, post) {
      const response = await fetch("/api/capture-order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${accessToken}`,
        },
        body: JSON.stringify({
          orderID,
          item_name: "Deep Report",
          source_title: post.title || "",
          source_content: post.selftext || "",
        }),
      });
      const json = await response.json();
      if (!response.ok) throw new Error(json.error || "Failed to capture report payment.");
      if (json.report_id) {
        window.location.href = `report.html?report_id=${encodeURIComponent(json.report_id)}`;
      }
    }

        // 管理员直接生成报告（跳过 PayPal）
        async function adminGenerateReport(post) {
      const response = await fetch("/api/capture-order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${accessToken}`,
        },
        body: JSON.stringify({
          item_name: "Deep Report",
          source_title: post.title || "",
          source_content: post.selftext || "",
        }),
      });
      const json = await response.json();
      if (!response.ok) throw new Error(json.error || "Failed to generate report.");
      if (json.report_id) {
        window.location.href = `report.html?report_id=${encodeURIComponent(json.report_id)}`;
      } else {
        throw new Error("Report generation did not return a report ID.");
      }
    }

    function showReportPayPal(buttonId, post) {
      const container = document.getElementById(buttonId);
      if (!container) return;
      container.innerHTML = "";
      window.paypal.Buttons({
        style: { layout: "horizontal", color: "blue", shape: "pill", label: "paypal" },
        createOrder: (_, actions) => actions.order.create({
          purchase_units: [
            {
              amount: { currency_code: "USD", value: "14.99" },
              description: "Deep Report",
              custom_id: JSON.stringify({ item_name: "Deep Report" }),
            },
          ],
        }),
        onApprove: async (data) => {
          try {
            await captureReportOrder(data.orderID, post);
          } catch (error) {
            setStatus(error.message || "Failed to generate deep report.");
          }
        },
        onError: () => setStatus("PayPal checkout failed."),
      }).render(`#${buttonId}`);
    }

    function renderResults(posts) {
      if (!posts.length) {
        results.innerHTML = `<article class="result-card"><h3 class="card-title">No results found. Try a different search.</h3></article>`;
        return;
      }

      results.innerHTML = posts.map((post, idx) => {
        const title = escapeHtml(post.title || "Untitled post");
        const permalink = escapeHtml(post.permalink || "https://www.reddit.com/r/SomebodyMakeThis/");
        const ai = post.ai || {};
        const stars = starsFromPainIntensity(ai.pain_intensity);
        const heat = Number.isFinite(ai.attention_score) ? `🔥 ${ai.attention_score}/10 heat` : "Heat: unavailable";
        const summary = escapeHtml(ai.summary && String(ai.summary).trim() ? ai.summary : "AI summary unavailable.");
        const paypalId = `report-paypal-${idx}`;

        return `
          <article class="result-card">
            <h3 class="card-title">
              <a href="${permalink}" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">${title}</a>
            </h3>
            <div class="meta">
              <span class="source">Reddit</span>
              <span class="heat">${escapeHtml(heat)}</span>
              <span class="heat">${stars ? `Pain: ${stars}` : "Pain: -"}</span>
            </div>
            <p class="desc">AI Summary: ${summary}</p>
            <button class="report-btn" type="button" data-report-index="${idx}">📄 Generate Deep Report $14.99</button>
            <div class="paypal-area" id="${paypalId}" data-paypal-slot></div>
          </article>
        `;
      }).join("");

      results.querySelectorAll(".report-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const idx = Number(btn.getAttribute("data-report-index"));
          const post = posts[idx];
          if (!accessToken) {
            setStatus("Please sign in first.");
            window.location.href = "auth.html";
            return;
          }
          // ====== 管理员判断 ======
          if (profileState && profileState.is_admin) {
            try {
              setStatus("Generating report as admin...");
              await adminGenerateReport(post);
            } catch (error) {
              setStatus(error.message || "Failed to generate admin report.");
            }
            return;
          }
          // ====== 普通用户走 PayPal ======
          try {
            await ensurePayPalLoaded();
            showReportPayPal(`report-paypal-${idx}`, post);
          } catch (error) {
            setStatus(error.message || "Unable to start PayPal checkout.");
          }
        });
      });

    function renderNetworkError(error) {
      const detail = error && error.message ? escapeHtml(error.message) : "Unknown error";
      results.innerHTML = `
        <article class="result-card">
          <h3 class="card-title">Something went wrong.</h3>
          <p class="desc">Please try again shortly.</p>
          <p class="desc">Details: ${detail}</p>
        </article>
      `;
    }

    async function fetchSearch(keyword) {
      const response = await fetch(`/api/search?query=${encodeURIComponent(keyword)}`, {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      const json = await response.json();
      if (!response.ok) throw new Error(json.error || `API request failed: ${response.status}`);
      if (json.profile) {
        profileState = json.profile;
        updateAccountUi();
      }
      return json;
    }

    async function loadProfile() {
      if (!accessToken) return null;
      const response = await fetch("/api/profile", {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      const json = await response.json();
      if (!response.ok) throw new Error(json.error || "Failed to load profile.");
      profileState = json.profile || null;
      updateAccountUi();
      return profileState;
    }

    async function initSupabaseSession() {
      const configRes = await fetch("/api/config");
      const config = await configRes.json();
      if (!config.supabaseUrl || !config.supabaseAnonKey) {
        throw new Error("Supabase public config is missing.");
      }
      supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
      const { data: subData } = supabaseClient.auth.onAuthStateChange(async (_event, session) => {
        if (!session) {
          isAuthenticated = false;
          accessToken = "";
          profileState = null;
          localStorage.removeItem("ideaRadarAccessToken");
          updateAccountUi();
          return;
        }
        isAuthenticated = true;
        accessToken = session.access_token || "";
        localStorage.setItem("ideaRadarAccessToken", accessToken);
        try {
          await loadProfile();
        } catch (error) {
          setStatus(error.message || "Failed to refresh profile.");
        }
      });
      authSubscription = subData?.subscription || null;

      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        throw new Error(error.message || "Failed to initialize auth session.");
      }
      const session = data?.session || null;
      if (!session) {
        isAuthenticated = false;
        accessToken = "";
        profileState = null;
        updateAccountUi();
        return;
      }
      isAuthenticated = true;
      accessToken = session.access_token || "";
      localStorage.setItem("ideaRadarAccessToken", accessToken);
      await loadProfile();
    }

    async function handleSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) {
        renderResults([]);
        return;
      }
      if (!isAuthenticated || !accessToken) {
        alert("Please sign in to search.");
        window.location.href = "auth.html";
        return;
      }

      if (!profileState) {
        try {
          await loadProfile();
        } catch (error) {
          setStatus(error.message || "Please sign in first.");
          window.location.href = "auth.html";
          return;
        }
      }

      if (profileState && !isProActive(profileState) && Number(profileState.search_credits || 0) <= 0) {
        setStatus("You have no search credits. Please upgrade.");
        results.innerHTML = `<article class="result-card"><p class="desc">You have no search credits. Please <a href="pricing.html">upgrade</a>.</p></article>`;
        return;
      }

      searchBtn.textContent = "Searching...";
      searchBtn.disabled = true;
      setStatus("");
      pushRecentSearch(keyword);

      try {
        const json = await fetchSearch(keyword);
        const posts = Array.isArray(json.results) ? json.results : [];
        renderResults(posts);
      } catch (error) {
        if ((error.message || "").toLowerCase().includes("insufficient credits")) {
          setStatus("You have no search credits. Please upgrade.");
          results.innerHTML = `<article class="result-card"><p class="desc">You have no search credits. Please <a href="pricing.html">upgrade</a>.</p></article>`;
        } else {
          renderNetworkError(error);
        }
      } finally {
        searchBtn.textContent = defaultBtnText;
        searchBtn.disabled = false;
      }
    }

    recentTags.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const keyword = target.getAttribute("data-keyword");
      if (!keyword) return;
      searchInput.value = keyword;
      searchInput.focus();
    });
    searchBtn.addEventListener("click", handleSearch);
    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") handleSearch();
    });
    logoutBtn.addEventListener("click", () => {
      const next = async () => {
        if (supabaseClient) {
          await supabaseClient.auth.signOut();
        }
        if (authSubscription) {
          authSubscription.unsubscribe();
          authSubscription = null;
        }
        localStorage.removeItem("ideaRadarAccessToken");
        window.location.reload();
      };
      next().catch(() => {
        localStorage.removeItem("ideaRadarAccessToken");
        window.location.reload();
      });
    });

    renderRecentSearches();
        // 尝试从本地存储恢复 token
        (function restoreSessionFromLocal() {
      const storedToken = localStorage.getItem("ideaRadarAccessToken");
      if (storedToken && !accessToken) {
        accessToken = storedToken;
        // 异步尝试获取 profile，不阻塞页面渲染
        loadProfile().catch(() => {
          localStorage.removeItem("ideaRadarAccessToken");
          accessToken = "";
        });
      }
    })();
    initSupabaseSession()
      .catch((error) => {
        navLoading.classList.add("hidden");
        isAuthenticated = false;
        accessToken = "";
        profileState = null;
        updateAccountUi();
        setStatus(error.message || "Please sign in.");
      });
  </script>
</body>
</html>
