<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaRadar</title>
  <style>
    :root {
      --bg: #0f1117;
      --bg-soft: #151922;
      --card: #f5f7ff;
      --text-main: #f2f5ff;
      --text-sub: #9ca7c2;
      --accent: #3b82f6;
      --accent-dark: #5b9bff;
      --card-text: #1c2436;
      --card-sub: #5a6685;
      --shadow: 0 18px 40px rgba(10, 12, 20, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 15% 20%, #1a2440 0%, transparent 38%),
        radial-gradient(circle at 85% 0%, #1a2d57 0%, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .container {
      width: min(920px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.5vw, 3.1rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .subtitle {
      margin: 14px auto 0;
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      color: var(--text-sub);
      max-width: 680px;
    }

    .search-row {
      margin: 32px auto 0;
      width: min(700px, 100%);
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      border-radius: 10px;
      background: var(--bg-soft);
      color: var(--text-main);
      padding: 14px 16px;
      font-size: 1rem;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
      border: 1px solid transparent;
    }

    .search-input::placeholder {
      color: #7482a4;
    }

    .search-input:focus {
      border-color: rgba(59, 130, 246, 0.75);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.22);
    }

    .search-btn {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 0.97rem;
      font-weight: 700;
      color: white;
      background: var(--accent);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.35);
      transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .search-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(91, 155, 255, 0.5);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    .results {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      text-align: left;
    }

    .recent-searches {
      margin: 14px auto 0;
      width: min(700px, 100%);
      text-align: left;
    }

    .recent-title {
      margin: 0 0 10px;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .recent-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .recent-tag {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.84rem;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .recent-tag:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(91, 155, 255, 0.8);
      transform: translateY(-1px);
    }

    .result-card {
      background: var(--card);
      color: var(--card-text);
      border-radius: 14px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .result-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
    }

    .card-title {
      margin: 0 0 8px;
      font-size: 1.02rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 10px;
      font-size: 0.86rem;
      color: var(--card-sub);
    }

    .source {
      color: #3b67d1;
      font-weight: 600;
    }

    .heat {
      font-weight: 600;
    }

    .desc {
      margin: 0;
      color: #3e4a67;
      font-size: 0.92rem;
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Find Startup Ideas in One Search</h1>
    <p class="subtitle">Discover real pain points from Reddit, powered by AI</p>

    <div class="search-row">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Try: remote team productivity, pet health, travel planning..."
      />
      <button id="searchBtn" class="search-btn" type="button">Search</button>
    </div>

    <section class="recent-searches">
      <p class="recent-title">Recent searches</p>
      <div id="recentTags" class="recent-tags"></div>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script>
    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    const results = document.getElementById("results");
    const recentTags = document.getElementById("recentTags");
    const defaultBtnText = searchBtn.textContent;
    const RECENT_SEARCHES_KEY = "ideaRadarRecentSearches";
    const MAX_RECENT_SEARCHES = 20;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRecentSearches() {
      try {
        const raw = localStorage.getItem(RECENT_SEARCHES_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecentSearches(keywords) {
      localStorage.setItem(RECENT_SEARCHES_KEY, JSON.stringify(keywords.slice(0, MAX_RECENT_SEARCHES)));
    }

    function renderRecentSearches() {
      const keywords = getRecentSearches();
      if (!keywords.length) {
        recentTags.innerHTML = "";
        return;
      }

      recentTags.innerHTML = keywords
        .map((keyword) => {
          const safeKeyword = escapeHtml(keyword);
          return `<button class="recent-tag" type="button" data-keyword="${safeKeyword}">${safeKeyword}</button>`;
        })
        .join("");
    }

    function pushRecentSearch(keyword) {
      const value = keyword.trim();
      if (!value) {
        return;
      }
      const list = getRecentSearches().filter((item) => item.toLowerCase() !== value.toLowerCase());
      list.unshift(value);
      saveRecentSearches(list);
      renderRecentSearches();
    }

    function truncateText(text, maxLength) {
      if (!text) {
        return "No description available...";
      }
      const trimmed = text.replace(/\s+/g, " ").trim();
      if (!trimmed) {
        return "No description available...";
      }
      if (trimmed.length <= maxLength) {
        return `${trimmed}...`;
      }
      return `${trimmed.slice(0, maxLength)}...`;
    }

    function renderResults(posts) {
      if (!posts.length) {
        results.innerHTML = `
          <article class="result-card">
            <h3 class="card-title">No results found. Try a different search.</h3>
          </article>
        `;
        return;
      }

      results.innerHTML = posts
        .map((post) => {
          const data = post.data || {};
          const title = escapeHtml(data.title || "Untitled post");
          const score = Number.isFinite(data.score) ? data.score : 0;
          const description = escapeHtml(truncateText(data.selftext || "", 150));
          const permalink = data.permalink
            ? `https://www.reddit.com${data.permalink}`
            : (data.url || "https://www.reddit.com/r/SomebodyMakeThis/");

          return `
            <article class="result-card">
              <h3 class="card-title">
                <a href="${escapeHtml(permalink)}" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">
                  ${title}
                </a>
              </h3>
              <div class="meta">
                <span class="source">Reddit - r/SomebodyMakeThis</span>
                <span class="heat">${score} mentions</span>
              </div>
              <p class="desc">${description}</p>
            </article>
          `;
        })
        .join("");
    }

    function renderNetworkError(error) {
      const detail = (error && error.message) ? escapeHtml(error.message) : "Unknown error";
      results.innerHTML = `
        <article class="result-card">
          <h3 class="card-title">Network error or CORS blocked request.</h3>
          <p class="desc">Please try again later or check browser/network settings.</p>
          <p class="desc">Debug: ${detail}</p>
        </article>
      `;
    }

    async function fetchRedditPosts(keyword) {
      const apiUrl = `/api/search?query=${encodeURIComponent(keyword)}`;
      const response = await fetch(apiUrl);
      if (!response.ok) {
        let message = `API request failed: ${response.status}`;
        try {
          const errorData = await response.json();
          if (errorData && errorData.error) {
            message = `${message} - ${errorData.error}`;
          }
        } catch (error) {
          // Ignore JSON parse failures and keep default message.
        }
        throw new Error(message);
      }
      return await response.json();
    }

    async function handleSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) {
        results.innerHTML = `
          <article class="result-card">
            <h3 class="card-title">No results found. Try a different search.</h3>
          </article>
        `;
        return;
      }

      searchBtn.textContent = "Searching...";
      searchBtn.disabled = true;
      pushRecentSearch(keyword);

      try {
        const json = await fetchRedditPosts(keyword);
        const posts = (json && json.data && Array.isArray(json.data.children)) ? json.data.children : [];
        renderResults(posts);
      } catch (error) {
        renderNetworkError(error);
      } finally {
        searchBtn.textContent = defaultBtnText;
        searchBtn.disabled = false;
      }
    }

    searchBtn.addEventListener("click", handleSearch);
    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        handleSearch();
      }
    });

    recentTags.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }
      const keyword = target.getAttribute("data-keyword");
      if (!keyword) {
        return;
      }
      searchInput.value = keyword;
      searchInput.focus();
    });

    renderRecentSearches();
  </script>
</body>
</html>
